// AUTH
async function ensureAuth() {
  const { data: { session } } = await sb.auth.getSession();
  if (session?.user) return session.user;
  const { data, error } = await sb.auth.signInAnonymously();
  if (error) throw error;
  return data.user;
}

// QUESTION ROUTER
function decodeHTML(str) {
  const ta = document.createElement('textarea');
  ta.innerHTML = str;
  return ta.value;
}

async function fetchInternalQuestions(categoryId, difficulty, count=6) {
  const { data, error } = await sb.rpc('get_session_questions', {
    p_category_id: categoryId,
    p_difficulty:  difficulty,
    p_limit:       count,
  });
  if (error || !data) return [];
  return data.map(q => ({ ...q, answers: Array.isArray(q.answers) ? q.answers : JSON.parse(q.answers) }));
}

async function fetchOpenTDBQuestions(opentdbId, difficulty, count=4) {
  if (!opentdbId) return [];
  try {
    const url = `https://opentdb.com/api.php?amount=${count}&category=${opentdbId}&difficulty=${difficulty}&type=multiple&encode=url3986`;
    const res  = await fetch(url);
    const json = await res.json();
    if (json.response_code !== 0) return [];
    return json.results.map(q => {
      const wrong   = q.incorrect_answers.map(a => decodeURIComponent(a));
      const correct = decodeURIComponent(q.correct_answer);
      const answers = [...wrong, correct].sort(() => Math.random() - 0.5);
      return {
        question:      decodeURIComponent(q.question),
        answers,
        correct_index: answers.indexOf(correct),
        source:        'opentdb',
      };
    });
  } catch { return []; }
}

async function buildSession(categoryId, opentdbId, difficulty) {
  const diff = DIFF_MAP[difficulty] || 'medium';
  const [internal, external] = await Promise.all([
    fetchInternalQuestions(categoryId, diff, 6),
    fetchOpenTDBQuestions(opentdbId, diff, 4),
  ]);
  let questions = [...internal, ...external].sort(() => Math.random() - 0.5);
  if (questions.length < 5) questions = [...LOCAL_FALLBACK].sort(() => Math.random() - 0.5);
  return questions.slice(0, 10);
}

// SESSION PERSISTENCE
async function saveSession(userId, categoryId, difficulty, score, correctCount, bestStreak, speedBonus, questions) {
  const diff = DIFF_MAP[difficulty] || 'medium';
  const { data } = await sb.from('sessions').insert({
    user_id:       userId,
    category_id:   categoryId,
    difficulty:    diff,
    score,
    correct_count: correctCount,
    best_streak:   bestStreak,
    speed_bonus:   speedBonus,
    question_set:  questions,
    completed_at:  new Date().toISOString(),
  }).select('id').single();
  await sb.rpc('upsert_personal_best', { p_user_id: userId, p_category_id: categoryId, p_score: score });
  await sb.rpc('update_streak',        { p_user_id: userId });
  await sb.rpc('update_weekly_score',  { p_user_id: userId, p_score: score });
  const { data: newBadges } = await sb.rpc('check_and_award_badges', { p_user_id: userId });
  return { sessionId: data?.id, newBadges: newBadges || [] };
}

// MATCH MANAGEMENT
function clientMatchCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  return Array.from({ length:4 }, () => chars[Math.floor(Math.random()*chars.length)]).join('');
}

async function createMatch(userId, displayName, category, difficulty) {
  const diff  = DIFF_MAP[difficulty] || 'medium';
  const code  = clientMatchCode();
  const questions = await buildSession(category.id, category.opentdb_id, difficulty);
  const { data: match, error } = await sb.from('matches').insert({
    code, host_id: userId,
    category_id:  category.id,
    difficulty:   diff,
    status:       'waiting',
    question_set: questions,
  }).select('id,code').single();
  if (error) throw error;
  // Host joins as player
  await sb.from('match_players').insert({
    match_id: match.id, user_id: userId, display_name: displayName,
  });
  return match;
}

async function joinMatch(code, userId, displayName) {
  const { data: match, error } = await sb.from('matches')
    .select('id,code,status,category_id,difficulty,question_set')
    .eq('code', code.toUpperCase())
    .eq('status','waiting')
    .single();
  if (error || !match) throw new Error('Match not found or already started');
  await sb.from('match_players').insert({
    match_id: match.id, user_id: userId, display_name: displayName,
  });
  return match;
}

async function startMatch(matchId) {
  await sb.from('matches').update({ status:'active', started_at: new Date().toISOString() }).eq('id', matchId);
}

async function updatePlayerScore(matchId, userId, score, qIndex, completed) {
  await sb.from('match_players').update({
    score, current_q_index: qIndex, completed,
  }).eq('match_id', matchId).eq('user_id', userId);
}

  let bg='transparent', bord=dark?'rgba(244,238,230,0.22)':EC.creamLine;

  else if (state==='correct') { bord=dark?EC.cream:EC.teal; bg=dark?'rgba(244,238,230,0.08)':EC.tealSoft; }

    <div onClick={onClick} style={{ border:`1px solid ${bord}`, borderRadius:5, padding:'14px 16px',

// ─── Screen: Question ─────────────────────────────────────────
function QuestionScreen({ question, qIndex, totalQs, score, difficulty, onAnswer, onExit, opponentScore }) {
  const [timeLeft,  setTimeLeft]  = useState(TIMER_TOTAL);
  const [chosen,    setChosen]    = useState(null);
  const [revealed,  setRevealed]  = useState(false);
  const timerRef    = useRef(null);
  const timeAtAnswerRef = useRef(TIMER_TOTAL);

  const personal = !!question.personal;
  const dark     = personal;

  useEffect(() => {
    setTimeLeft(TIMER_TOTAL); setChosen(null); setRevealed(false);
    timeAtAnswerRef.current = TIMER_TOTAL;
  }, [question]);

  useEffect(() => {
    if (revealed) return;
    timerRef.current = setInterval(() => {
      setTimeLeft(t => {
        if (t <= 1) {
          clearInterval(timerRef.current);
          setRevealed(true);
          setTimeout(() => onAnswer(false, 0, 0), 1100);
          return 0;
        }
        return t - 1;
      });
    }, 1000);
    return () => clearInterval(timerRef.current);
  }, [question, revealed]);

  function handleSelect(idx) {
    if (revealed) return;
    clearInterval(timerRef.current);
    timeAtAnswerRef.current = timeLeft;
    setChosen(idx); setRevealed(true);
    const correct = idx === question.correct_index;
    const base    = difficulty==='Hard'?300 : difficulty==='Medium'?200 : 100;
    const pts     = correct ? base + Math.round(base*(timeLeft/TIMER_TOTAL)*0.5) : 0;
    setTimeout(() => onAnswer(correct, pts, timeLeft), 950);
  }

  function tileState(idx) {
    if (!revealed) return chosen===idx?'selected':'idle';
    if (idx===question.correct_index) return 'correct';
    if (idx===chosen && idx!==question.correct_index) return 'wrong';
    return 'idle';
  }

  return (
    <div style={{ width:'100%', height:'100%', background:dark?EC.tealDeep:EC.cream, display:'flex', flexDirection:'column' }}>
      <div style={{ padding:'54px 24px 0' }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
          <div style={{ display:'flex', alignItems:'center', gap:8 }}>
            <span onClick={onExit} style={{ fontFamily:ecSerif, fontSize:20, color:dark?EC.onTealSoft:EC.inkSoft, cursor:'pointer' }}>←</span>
            <ECHair vertical length={14} color={dark?EC.tealLine:EC.creamLine} />
            <ECSmallCaps color={dark?EC.onTealSoft:EC.inkSoft} size={10}>
              {personal?'A personal question':difficulty}
            </ECSmallCaps>
          </div>
          <TimerArc remaining={timeLeft} dark={dark} />
        </div>
        <div style={{ height:1, background:dark?EC.tealLine:EC.creamLine, marginTop:14 }} />
      </div>
      <div style={{ padding:'14px 28px 0', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
        <ECSmallCaps color={dark?EC.onTealFaint:EC.inkFaint} size={10}>
          Question {String(qIndex+1).padStart(2,'0')} / {totalQs}
        </ECSmallCaps>
        <div style={{ display:'flex', alignItems:'center', gap:14 }}>
          <div style={{ display:'flex', alignItems:'center', gap:7 }}>
            <ECSmallCaps color={dark?EC.onTealFaint:EC.inkFaint} size={10}>Score</ECSmallCaps>
            <ECMono color={dark?EC.cream:EC.ink} size={13}>{String(score).padStart(4,'0')}</ECMono>
          </div>
          {opponentScore !== undefined && (
            <div style={{ display:'flex', alignItems:'center', gap:7 }}>
              <ECHair vertical length={12} color={dark?EC.tealLine:EC.creamLine} />
              <ECSmallCaps color={dark?EC.onTealFaint:EC.inkFaint} size={9}>Opp.</ECSmallCaps>
              <ECMono color={dark?EC.onTealSoft:EC.inkSoft} size={12}>{String(opponentScore).padStart(4,'0')}</ECMono>
            </div>
          )}
        </div>
      </div>
      {personal && (
        <div style={{ padding:'16px 28px 0', display:'flex', alignItems:'center', gap:10 }}>
          <span style={{ color:EC.cream, opacity:0.7, fontFamily:ecSerif, fontSize:14 }}>♥</span>
          <ECSmallCaps color={EC.onTealSoft} size={9}>For Claude — from Eau</ECSmallCaps>
        </div>
      )}
      <div style={{ padding:'20px 28px 18px' }}>
        <div style={{ fontFamily:ecSerif, fontWeight:400, fontSize:personal?23:26, lineHeight:1.22,
          color:dark?EC.cream:EC.ink, letterSpacing:'-0.005em' }}>
          {question.question}
        </div>
      </div>
      <div style={{ padding:'0 24px', display:'flex', flexDirection:'column', gap:9, flex:1 }}>
        {question.answers.map((ans,i) => (
          <AnswerTile key={i} letter={LETTERS[i]} text={ans} state={tileState(i)} dark={dark}
            onClick={revealed?undefined:() => handleSelect(i)} />
        ))}
      </div>
      <div style={{ padding:'12px 28px 24px', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
        <ECSmallCaps color={dark?EC.onTealFaint:EC.inkFaint} size={9}>
          {personal?'Personal · Sparingly served':'Streak'}
        </ECSmallCaps>
        {!personal && (
          <div style={{ display:'flex', gap:5 }}>
            {Array.from({length:10}).map((_,i) => (
              <div key={i} style={{ width:6, height:6, borderRadius:6, background:i<qIndex?EC.teal:EC.creamLine }} />
            ))}
          </div>
        )}
        {personal && <ECSmallCaps color={EC.onTealFaint} size={9}>+200 if correct</ECSmallCaps>}
      </div>
    </div>
  );
}

    if (code.trim().length !== 4) { setErr('Enter the 4-character match code'); return; }

  return (
    <div style={{ width:'100%', height:'100%', background:EC.cream, display:'flex', flexDirection:'column' }}>
      <ECPageHeader left="No. 005" right="Join a match" />

          placeholder="e.g. 8FA3"

}

// ─── App shell ────────────────────────────────────────────────
function App() {
  // Auth state
  const [user,    setUser]    = useState(null);
  const [profile, setProfile] = useState(null);
  const [authReady, setAuthReady] = useState(false);

  // Phase 3: badges catalogue + newly earned list
  const [allBadges,     setAllBadges]     = useState([]);
  const [newBadgesList, setNewBadgesList] = useState([]);

  // Navigation
  const [screen,    setScreen]    = useState('home');
  const [prevBest,  setPrevBest]  = useState(0);

  // Solo session
  const [category,   setCategory]   = useState(null);
  const [difficulty, setDifficulty] = useState('Medium');
  const [questions,  setQuestions]  = useState([]);
  const [qIndex,     setQIndex]     = useState(0);
  const [score,      setScore]      = useState(0);
  const [correct,    setCorrect]    = useState(0);
  const [fastestSecs,setFastestSecs]= useState(TIMER_TOTAL);
  const [bestStreak, setBestStreak] = useState(0);
  const [curStreak,  setCurStreak]  = useState(0);
  const [speedBonus, setSpeedBonus] = useState(0);

  // H2H match state
  const [match,       setMatch]       = useState(null);
  const [matchPlayers,setMatchPlayers]= useState([]);
  const [isHost,      setIsHost]      = useState(false);
  const [opponentScore,setOpponentScore] = useState(undefined);
  const [matchWinner, setMatchWinner] = useState(null);
  const [joinLoading, setJoinLoading] = useState(false);
  const [lobbyView,   setLobbyView]   = useState('create'); // 'create' | 'join'

  // Admin tap counter (secret: tap monogram 7×)
  const [monogramTaps, setMonogramTaps] = useState(0);
  const monogramTimeout = useRef(null);

  // ── Boot: auth + badges catalogue + check join code in URL ───
  useEffect(() => {
    (async () => {
      try {
        const [u] = await Promise.all([
          ensureAuth(),
          sb.from('badges').select('*').then(({ data }) => setAllBadges(data || [])),
        ]);
        setUser(u);
        const p = await loadProfile(u.id);
        setProfile(p);
        setPrevBest(p?.personal_best || 0);
        if (!p?.display_name || p.display_name === 'Player') {
          setScreen('nameSetup');
        }
        const joinCode = new URLSearchParams(window.location.search).get('join');
        if (joinCode) {
          window.history.replaceState({}, '', window.location.pathname);
          handleJoinMatch(joinCode, u, p);
        }
      } catch (e) {
        console.error('Auth failed:', e);
      } finally {
        setAuthReady(true);
      }
    })();
  }, []);

  // ── Monogram tap (secret admin) ───────────────────────────────
  function handleMonogramTap() {
    const next = monogramTaps + 1;
    setMonogramTaps(next);
    clearTimeout(monogramTimeout.current);
    if (next >= 7 && profile?.is_admin) { setScreen('admin'); setMonogramTaps(0); return; }
    monogramTimeout.current = setTimeout(() => setMonogramTaps(0), 3000);
  }

  // ── Name setup ────────────────────────────────────────────────
  async function handleNameSave(name) {
    await updateDisplayName(user.id, name);
    setProfile(p => ({ ...p, display_name: name }));
    setScreen('home');
  }

  // ── Solo game ─────────────────────────────────────────────────
  async function startSolo(cat, diff) {
    setCategory(cat); setDifficulty(diff);
    setScreen('loading');
    const qs = await buildSession(cat.id, cat.opentdb_id, diff);
    setQuestions(qs); setQIndex(0);
    setScore(0); setCorrect(0);
    setFastestSecs(TIMER_TOTAL); setBestStreak(0); setCurStreak(0); setSpeedBonus(0);
    setScreen('question');
  }

  async function handleAnswer(isCorrect, pts, timeAtAnswer) {
    const base     = difficulty==='Hard'?300:difficulty==='Medium'?200:100;
    const bonus    = isCorrect ? pts - base : 0;
    const newScore = score + pts;
    const newCorr  = correct + (isCorrect?1:0);
    const newStrk  = isCorrect ? curStreak+1 : 0;
    const newBest  = Math.max(bestStreak, newStrk);
    const newFast  = isCorrect && timeAtAnswer > 0
      ? Math.min(fastestSecs, TIMER_TOTAL - timeAtAnswer + 0.1)
      : fastestSecs;
    setScore(newScore); setCorrect(newCorr);
    setCurStreak(newStrk); setBestStreak(newBest);
    setSpeedBonus(prev => prev + bonus);
    setFastestSecs(newFast);

    if (match) {
      updatePlayerScore(match.id, user.id, newScore, qIndex+1, qIndex+1 >= questions.length);
    }

    if (qIndex+1 >= questions.length) {
      if (!match) {
        try {
          const { newBadges } = await saveSession(
            user.id, category.id, difficulty, newScore, newCorr, newBest, speedBonus+bonus, questions
          );
          if (newScore > prevBest) {
            setPrevBest(newScore);
            setProfile(p => ({ ...p, personal_best: newScore }));
          }
          if (newBadges.length > 0) setNewBadgesList(newBadges);
          // Refresh streak from DB
          loadProfile(user.id).then(p => p && setProfile(p));
        } catch(e) { console.error('saveSession failed:', e); }
      }
      if (match) {
        sb.rpc('complete_match', { p_match_id: match.id }).catch(() => {});
        const opp = matchPlayers.find(p => p.user_id !== user.id);
        setMatchWinner(opp && newScore > opp.score ? 'you' : 'opponent');
      }
      setTimeout(() => setScreen('results'), 420);
    } else {
      setQIndex(i => i+1);
    }
  }

  // ── H2H: create match ─────────────────────────────────────────
  async function handleCreateMatch(cat, diff) {
    setCategory(cat); setDifficulty(diff);
    setScreen('loading');
    const name = profile?.display_name || 'Eau';
    try {
      const m = await createMatch(user.id, name, cat, diff);
      setMatch(m); setIsHost(true);
      subscribeToMatch(m.id);
      const { data: qs } = await sb.from('matches').select('question_set').eq('id', m.id).single();
      setQuestions(qs?.question_set || []);
      const { data: players } = await sb.from('match_players').select('*').eq('match_id', m.id);
      setMatchPlayers(players || []);
      setScreen('lobby');
    } catch (e) {
      console.error(e);
      setScreen('category');
    }
  }

  // ── H2H: join match ───────────────────────────────────────────
  async function handleJoinMatch(code, u=user, p=profile) {
    if (!u) return;
    setJoinLoading(true);
    try {
      const m = await joinMatch(code, u.id, p?.display_name || 'Claude');
      setMatch(m); setIsHost(false);
      subscribeToMatch(m.id);
      setQuestions(Array.isArray(m.question_set) ? m.question_set : JSON.parse(m.question_set));
      const { data: players } = await sb.from('match_players').select('*').eq('match_id', m.id);
      setMatchPlayers(players || []);
      setScreen('lobby');
    } catch (e) {
      alert(e.message);
    } finally {
      setJoinLoading(false);
    }
  }

  // ── H2H: realtime subscription ───────────────────────────────
  const channelRef = useRef(null);
  function subscribeToMatch(matchId) {
    if (channelRef.current) channelRef.current.unsubscribe();
    channelRef.current = sb.channel(`match-${matchId}`)
      .on('postgres_changes', { event:'UPDATE', schema:'public', table:'match_players', filter:`match_id=eq.${matchId}` },
        payload => {
          const updated = payload.new;
          setMatchPlayers(prev => {
            const next = prev.map(p => p.id === updated.id ? { ...p, ...updated } : p);
            if (!next.find(p => p.id === updated.id)) return [...prev, updated];
            return next;
          });
          if (updated.user_id !== user?.id) setOpponentScore(updated.score);
        })
      .on('postgres_changes', { event:'UPDATE', schema:'public', table:'matches', filter:`id=eq.${matchId}` },
        payload => {
          const m = payload.new;
          setMatch(prev => ({ ...prev, ...m }));
          if (m.status === 'active' && screen === 'lobby') {
            setQIndex(0); setScore(0); setCorrect(0);
            setFastestSecs(TIMER_TOTAL); setBestStreak(0); setCurStreak(0); setSpeedBonus(0);
            setTimeout(() => setScreen('question'), 3200);
          }
        })
      .on('postgres_changes', { event:'INSERT', schema:'public', table:'match_players', filter:`match_id=eq.${matchId}` },
        payload => {
          setMatchPlayers(prev => [...prev, payload.new]);
        })
      .subscribe();
  }

  async function handleStartMatch() {
    if (!match) return;
    await startMatch(match.id);
    // Transition handled by subscription
    setQIndex(0); setScore(0); setCorrect(0);
    setFastestSecs(TIMER_TOTAL); setBestStreak(0); setCurStreak(0); setSpeedBonus(0);
    setTimeout(() => setScreen('question'), 3200);
  }

  // ── Screen routing ────────────────────────────────────────────
  if (!authReady) {
    return (
      <div style={{ display:'flex', alignItems:'center', justifyContent:'center', minHeight:'100vh' }}>
        <IOSDevice><LoadingScreen /></IOSDevice>
      </div>
    );
  }

  const isDark = (screen==='lobby' && match?.status==='active') || false;

  return (
    <div style={{ display:'flex', alignItems:'center', justifyContent:'center', minHeight:'100vh', padding:'20px 0' }}>
      <div style={{ filter:'drop-shadow(0 32px 56px rgba(10,30,36,0.22))' }}>
        <IOSDevice dark={isDark}>
          {screen==='nameSetup' && <NameSetupScreen onSave={handleNameSave} />}

          {screen==='home' && (
            <HomeScreen profile={profile} onSolo={() => setScreen('category')}
              onChallenge={() => { setLobbyView('create'); setScreen('challengeMenu'); }}
              onLeaderboard={() => setScreen('leaderboard')}
              onProfile={() => setScreen('profile')}
              monogramTaps={monogramTaps} onMonogramTap={handleMonogramTap} />
          )}

          {screen==='challengeMenu' && (
            <div style={{ width:'100%', height:'100%', background:EC.cream, display:'flex', flexDirection:'column' }}>
              <ECPageHeader left="No. 005" right="Head to head" />
              <div style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center',
                justifyContent:'center', padding:'0 32px', gap:12 }}>
                <div style={{ fontFamily:ecSerif, fontSize:28, lineHeight:1.05, color:EC.ink,
                  textAlign:'center', letterSpacing:'-0.01em' }}>
                  Head <em style={{ fontStyle:'italic', color:EC.teal }}>to</em> head
                </div>
                <div style={{ fontFamily:ecSerif, fontStyle:'italic', fontSize:15, color:EC.inkSoft, textAlign:'center' }}>
                  Challenge a friend to ten questions<br/>on the same question set.
                </div>
              </div>
              <div style={{ padding:'0 24px 28px', display:'flex', flexDirection:'column', gap:10 }}>
                <button onClick={() => setScreen('category-h2h')} style={{ width:'100%', height:56,
                  background:EC.teal, color:EC.cream, border:'none', borderRadius:6,
                  fontFamily:ecSerif, fontSize:19, cursor:'pointer',
                  display:'flex', alignItems:'center', justifyContent:'space-between', padding:'0 22px' }}>
                  <span>Create a match</span><span>→</span>
                </button>
                <button onClick={() => setScreen('join')} style={{ width:'100%', height:56,
                  background:'transparent', color:EC.ink, border:`1px solid ${EC.ink}`,
                  borderRadius:6, fontFamily:ecSerif, fontSize:19, cursor:'pointer',
                  display:'flex', alignItems:'center', justifyContent:'space-between', padding:'0 22px' }}>
                  <span>Join with a code</span><span>→</span>
                </button>
                <button onClick={() => setScreen('home')} style={{ width:'100%', height:44,
                  background:'transparent', color:EC.inkSoft, border:`1px solid ${EC.creamLine}`,
                  borderRadius:6, fontFamily:ecSerif, fontSize:16, cursor:'pointer' }}>Back</button>
              </div>
            </div>
          )}

          {screen==='category' && <CategoryScreen onBegin={startSolo} mode="solo" />}
          {screen==='category-h2h' && <CategoryScreen onBegin={handleCreateMatch} mode="h2h" />}

          {screen==='join' && (
            <JoinMatchScreen onJoin={code => handleJoinMatch(code)}
              onBack={() => setScreen('challengeMenu')} loading={joinLoading} />
          )}

          {screen==='loading' && <LoadingScreen category={category} />}

          {screen==='question' && questions.length > 0 && (
            <QuestionScreen question={questions[qIndex]} qIndex={qIndex}
              totalQs={questions.length} score={score} difficulty={difficulty}
              onAnswer={handleAnswer} onExit={() => { setMatch(null); setScreen('home'); }}
              opponentScore={match ? opponentScore : undefined} />
          )}

          {screen==='results' && (
            <ResultsScreen score={score} correct={correct}
              fastestSecs={fastestSecs>=TIMER_TOTAL?TIMER_TOTAL:fastestSecs}
              bestStreak={bestStreak} speedBonus={speedBonus}
              prevBest={prevBest} categoryName={category?.name||'General Knowledge'}
              matchWinner={matchWinner}
              newBadges={newBadgesList} allBadges={allBadges}
              onReplay={() => { setMatch(null); setMatchWinner(null); setNewBadgesList([]); startSolo(category, difficulty); }}
              onChallenge={() => { setMatch(null); setMatchWinner(null); setNewBadgesList([]); setScreen('challengeMenu'); }} />
          )}

          {screen==='lobby' && match && (
            <LobbyScreen match={match} players={matchPlayers}
              currentUserId={user?.id} isHost={isHost}
              onStart={handleStartMatch} onHome={() => { setMatch(null); setScreen('home'); }} />
          )}

          {screen==='leaderboard' && (
            <LeaderboardScreen userId={user?.id} onBack={() => setScreen('home')} />
          )}

          {screen==='profile' && (
            <ProfileScreen userId={user?.id} profile={profile} allBadges={allBadges}
              onBack={() => setScreen('home')} />
          )}

          {screen==='admin' && <AdminScreen userId={user?.id} onBack={() => setScreen('home')} />}
        </IOSDevice>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
